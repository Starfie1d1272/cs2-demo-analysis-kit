name: Release

# 打 vX.Y.Z tag 自动构建桌面应用（unsigned）并发布到 GitHub Release：
#   macOS  → dak-studio-X.Y.Z.dmg
#   Windows→ dak-studio-windows-X.Y.Z.zip
# 只发 DAK Studio（自带 exporter bridge）；纯导出器 cs2dak 不进 Release。
# 首次打开需绕过 Gatekeeper / SmartScreen，见 Release 描述。

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # sync-version.mjs 需要 git tag

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile

      - name: Build desktop packages
        run: bash scripts/package.sh
        shell: bash

      - name: Zip Windows executable
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          cd python/dist
          7z a "dak-studio-windows-${VERSION}.zip" dak-studio.exe

      - uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.os }}
          path: |
            python/dist/*.dmg
            python/dist/*.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          body: |
            **安装说明**

            1. 打开 DMG，把 **DAK Studio** 拖到右侧的 **Applications** 文件夹。
            2. 推出 DMG（桌面上右键 → 推出"DAK Studio"）。
            3. 从 **启动台** 或 `/Applications/DAK Studio.app` 打开。
            4. macOS 会提示「无法验证开发者」→ **系统设置 → 隐私与安全性 → 拉到底点「仍要打开」**。
               （不要直接从 DMG 挂载卷双击——Gatekeeper 会静默拒绝，没有任何提示。）

            终端一键解除隔离（替代步骤 4）：
            ```bash
            xattr -dr com.apple.quarantine "/Applications/DAK Studio.app"
            ```

            ---

            **Windows**
            - 解压 zip，双击 `dak-studio.exe`。
            - SmartScreen 警告 → 「更多信息」→「仍要运行」。
            - 老版本 Win10 如启动后白屏，需安装 [WebView2 Runtime](https://developer.microsoft.com/microsoft-edge/webview2/)。

            ---

            📝 完整变更记录：[CHANGELOG.md](https://github.com/Starfie1d1272/cs2-demo-analysis-kit/blob/main/CHANGELOG.md)
          generate_release_notes: true
