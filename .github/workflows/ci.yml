name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      # vitest 3.2.4 曾有 worker RPC onTaskUpdate 超时 bug（CI 全过仍 exit 1），
      # 已通过升级 vitest 4 根治；这里保持直跑，不要再加输出解析的 workaround。
      - run: pnpm test

      - run: pnpm build

  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check out cs2-demo-format (spec schemas)
        run: git clone --depth 1 https://github.com/Starfie1d1272/cs2-demo-format.git ../cs2-demo-format

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --extra dev
        working-directory: python

      - name: Run pytest
        run: uv run pytest
        working-directory: python
        env:
          CS2DAK_SPEC_DIR: ${{ github.workspace }}/../cs2-demo-format
