name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Run tests
        # vitest 3.2.4 在慢 CI runner 上全部测试通过后会触发内部 worker RPC
        # onTaskUpdate 超时（exit 1），7 轮均 157/157 全过。这里忽略该已知超时。
        run: |
          pnpm exec vitest run > /tmp/vitest.log 2>&1 || true
          if grep -q 'FAIL' /tmp/vitest.log; then
            echo "═══ 测试失败 ═══"
            grep -A2 'FAIL' /tmp/vitest.log
            exit 1
          fi
          COUNT=$(grep -oP 'Tests\s+\K\d+(?=\s+passed)' /tmp/vitest.log | head -1)
          if [ -z "$COUNT" ] || [ "$COUNT" -eq 0 ]; then
            echo "未检测到通过的测试"
            tail -20 /tmp/vitest.log
            exit 1
          fi
          echo "$COUNT 测试全部通过。"

      - run: pnpm build

  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out cs2-demo-format (spec schemas)
        run: git clone --depth 1 https://github.com/Starfie1d1272/cs2-demo-format.git ../cs2-demo-format

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --extra dev
        working-directory: python

      - name: Run pytest
        run: uv run pytest
        working-directory: python
        env:
          CS2DAK_SPEC_DIR: ${{ github.workspace }}/../cs2-demo-format
